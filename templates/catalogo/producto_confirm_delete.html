{% extends "base.html" %}
{% block title %}Eliminar {{ producto.nombre }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-header bg-danger text-white"><h4 class="mb-0"><i class="bi bi-exclamation-triangle"></i> Confirmar eliminación</h4></div>
            <div class="card-body text-center">
                <p class="fs-5">¿Eliminar el producto <strong>{{ producto.nombre }}</strong>?</p>
                <p class="text-muted">Esta acción no se puede deshacer.</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> Sí, eliminar</button>
                    <a href="{% url 'catalogo:admin_productos' %}" class="btn btn-outline-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
